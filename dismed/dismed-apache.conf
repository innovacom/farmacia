# ================================================================
#  DISMED — VirtualHost Apache
#  Dominio: sistema.innovacom.mx
#
#  Copiar a: /etc/apache2/sites-available/dismed.conf
#  Activar:  sudo a2ensite dismed.conf && sudo systemctl reload apache2
# ================================================================

<VirtualHost *:80>
    ServerName sistema.innovacom.mx

    # ── Frontend (React build estático) ──────────────────────────
    DocumentRoot /var/www/dismed/frontend

    <Directory /var/www/dismed/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        # React Router — todas las rutas van al index.html
        FallbackResource /index.html
    </Directory>

    # ── Backend API (Node.js en puerto 3001) ─────────────────────
    ProxyPreserveHost On

    ProxyPass        /api      http://127.0.0.1:3001/api
    ProxyPassReverse /api      http://127.0.0.1:3001/api

    ProxyPass        /outputs  http://127.0.0.1:3001/outputs
    ProxyPassReverse /outputs  http://127.0.0.1:3001/outputs

    # ── Logs ─────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/dismed_error.log
    CustomLog ${APACHE_LOG_DIR}/dismed_access.log combined
</VirtualHost>
